<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Review — Academic Review Platform</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/health.css" />
    <link rel="stylesheet" href="css/test-llm.css" />
    <link rel="stylesheet" href="css/test-agent.css" />
    <link rel="stylesheet" href="css/test-rag.css" />
    <link rel="stylesheet" href="css/graphrun.css" />
    <link rel="stylesheet" href="css/comparison.css" />
  </head>

  <body>
    <!-- ── Header ──────────────────────────────────────── -->
    <header class="header">
      <h1 class="header__title">LLM Review</h1>
      <p class="header__subtitle">Academic Peer Review Platform</p>
    </header>

    <!-- ── App body: sidebar + content ────────────────── -->
    <div class="app-body">
      <aside class="sidebar">
        <nav>
          <ul class="nav__list">
            <li class="nav__group-title">Dev Controller</li>
            <li class="nav__item" data-section="health">
              <span class="nav__icon">§</span>
              <span class="nav__label">System Status</span>
            </li>
            <li class="nav__item" data-section="test-llm">
              <span class="nav__icon">✎</span>
              <span class="nav__label">Test LLM</span>
            </li>
            <li class="nav__item" data-section="test-agent">
              <span class="nav__icon">A</span>
              <span class="nav__label">Test Agent</span>
            </li>
            <li class="nav__item" data-section="test-rag">
              <span class="nav__icon">R</span>
              <span class="nav__label">Test RAG</span>
            </li>
            <li class="nav__group-title">Pipeline</li>
            <li class="nav__item" data-section="prompts">
              <span class="nav__icon">✏</span>
              <span class="nav__label">Prompt Versions</span>
            </li>
            <li class="nav__item" data-section="graph-run">
              <span class="nav__icon">▶</span>
              <span class="nav__label">Graph Run</span>
            </li>
            <li class="nav__item" data-section="storico">
              <span class="nav__icon">⏱</span>
              <span class="nav__label">Storico Review</span>
            </li>
            <li class="nav__item" data-section="comparison">
              <span class="nav__icon">⇄</span>
              <span class="nav__label">Confronto Review</span>
            </li>
          </ul>
        </nav>
      </aside>

      <!-- dynamic section content injected here by router.js -->
      <main class="content" id="content-area"></main>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
