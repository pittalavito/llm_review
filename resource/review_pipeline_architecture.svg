<svg width="100%" viewBox="0 0 720 700" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Pipeline di revisione multi-agente</title>
<desc>Fan-out parallelo: Paper → [R1 (soundness) | R2 (empirical) | R3 (novelty)] → Meta-Reviewer → Area Chair → decisione → Author Agent con loop</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- ===== Paper Input ===== -->
<g>
<rect x="260" y="20" width="200" height="44" rx="8" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="360" y="42" text-anchor="middle" dominant-baseline="central" fill="rgb(211,209,199)" font-family="sans-serif" font-size="14" font-weight="500">Paper (PDF / TXT)</text>
</g>
<!-- RAG annotation -->
<text x="530" y="38" text-anchor="start" fill="rgb(194,192,182)" font-family="sans-serif" font-size="11">BM25 RAG</text>
<text x="530" y="52" text-anchor="start" fill="rgb(194,192,182)" font-family="sans-serif" font-size="11">(query per agente)</text>

<!-- Arrow down to fan-out point -->
<line x1="360" y1="64" x2="360" y2="90" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ===== Fan-out dot ===== -->
<circle cx="360" cy="94" r="4" fill="rgb(194,192,182)"/>

<!-- Fan-out lines to 3 reviewers -->
<line x1="360" y1="98" x2="120" y2="130" stroke="rgba(222,220,209,0.4)" stroke-width="0.5"/>
<line x1="360" y1="98" x2="360" y2="130" stroke="rgba(222,220,209,0.4)" stroke-width="0.5"/>
<line x1="360" y1="98" x2="600" y2="130" stroke="rgba(222,220,209,0.4)" stroke-width="0.5"/>

<!-- Arrow tips into each reviewer -->
<line x1="120" y1="126" x2="120" y2="140" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="360" y1="126" x2="360" y2="140" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="600" y1="126" x2="600" y2="140" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- "parallel" annotation -->
<text x="360" y="118" text-anchor="middle" fill="rgb(194,192,182)" font-family="sans-serif" font-size="10">parallel</text>

<!-- ===== Reviewer 1 — Soundness ===== -->
<g>
<rect x="40" y="140" width="160" height="52" rx="8" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="120" y="160" text-anchor="middle" dominant-baseline="central" fill="rgb(206,203,246)" font-family="sans-serif" font-size="13" font-weight="500">Reviewer 1</text>
<text x="120" y="178" text-anchor="middle" dominant-baseline="central" fill="rgb(175,169,236)" font-family="sans-serif" font-size="11">soundness</text>
</g>

<!-- ===== Reviewer 2 — Empirical ===== -->
<g>
<rect x="280" y="140" width="160" height="52" rx="8" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="360" y="160" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-family="sans-serif" font-size="13" font-weight="500">Reviewer 2</text>
<text x="360" y="178" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="sans-serif" font-size="11">empirical</text>
</g>

<!-- ===== Reviewer 3 — Novelty ===== -->
<g>
<rect x="520" y="140" width="160" height="52" rx="8" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="600" y="160" text-anchor="middle" dominant-baseline="central" fill="rgb(245,196,179)" font-family="sans-serif" font-size="13" font-weight="500">Reviewer 3</text>
<text x="600" y="178" text-anchor="middle" dominant-baseline="central" fill="rgb(240,153,123)" font-family="sans-serif" font-size="11">novelty</text>
</g>

<!-- Fan-in lines from reviewers -->
<line x1="120" y1="192" x2="120" y2="230" stroke="rgba(222,220,209,0.4)" stroke-width="0.5"/>
<line x1="360" y1="192" x2="360" y2="230" stroke="rgba(222,220,209,0.4)" stroke-width="0.5"/>
<line x1="600" y1="192" x2="600" y2="230" stroke="rgba(222,220,209,0.4)" stroke-width="0.5"/>
<line x1="120" y1="230" x2="600" y2="230" stroke="rgba(222,220,209,0.4)" stroke-width="0.5"/>

<!-- Arrow from fan-in to Meta-Reviewer -->
<line x1="360" y1="230" x2="360" y2="260" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ===== Meta-Reviewer ===== -->
<g>
<rect x="240" y="260" width="240" height="52" rx="8" fill="rgb(99,56,6)" stroke="rgb(239,159,39)" stroke-width="0.5"/>
<text x="360" y="280" text-anchor="middle" dominant-baseline="central" fill="rgb(250,199,117)" font-family="sans-serif" font-size="14" font-weight="500">Meta-Reviewer</text>
<text x="360" y="298" text-anchor="middle" dominant-baseline="central" fill="rgb(239,159,39)" font-family="sans-serif" font-size="11">rating · summary</text>
</g>

<!-- Arrow Meta → Area Chair -->
<line x1="360" y1="312" x2="360" y2="346" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ===== Area Chair ===== -->
<g>
<rect x="240" y="346" width="240" height="52" rx="8" fill="rgb(80,20,80)" stroke="rgb(200,140,220)" stroke-width="0.5"/>
<text x="360" y="366" text-anchor="middle" dominant-baseline="central" fill="rgb(230,190,255)" font-family="sans-serif" font-size="14" font-weight="500">Area Chair</text>
<text x="360" y="384" text-anchor="middle" dominant-baseline="central" fill="rgb(200,140,220)" font-family="sans-serif" font-size="11">accept | minor_revision | revise</text>
</g>

<!-- Arrow AC → Decision diamond -->
<line x1="360" y1="398" x2="360" y2="430" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ===== Decision diamond ===== -->
<polygon points="360,430 440,460 360,490 280,460" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.4)" stroke-width="0.5"/>
<text x="360" y="464" text-anchor="middle" dominant-baseline="central" fill="rgb(194,192,182)" font-family="sans-serif" font-size="11">decision?</text>

<!-- === Accept / minor_revision path (right) === -->
<line x1="440" y1="460" x2="600" y2="460" stroke="rgba(222,220,209,0.4)" stroke-width="0.5"/>
<line x1="600" y1="460" x2="600" y2="500" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="525" y="450" text-anchor="middle" fill="rgb(194,192,182)" font-family="sans-serif" font-size="11">accept / minor_revision</text>
<g>
<rect x="530" y="500" width="140" height="40" rx="8" fill="rgb(39,80,10)" stroke="rgb(151,196,89)" stroke-width="0.5"/>
<text x="600" y="520" text-anchor="middle" dominant-baseline="central" fill="rgb(192,221,151)" font-family="sans-serif" font-size="13" font-weight="500">END</text>
</g>

<!-- === Revise path (down) === -->
<line x1="360" y1="490" x2="360" y2="528" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="385" y="512" text-anchor="start" fill="rgb(194,192,182)" font-family="sans-serif" font-size="11">revise</text>

<!-- ===== Author Agent ===== -->
<g>
<rect x="240" y="528" width="240" height="52" rx="8" fill="rgb(12,68,124)" stroke="rgb(133,183,235)" stroke-width="0.5"/>
<text x="360" y="548" text-anchor="middle" dominant-baseline="central" fill="rgb(181,212,244)" font-family="sans-serif" font-size="14" font-weight="500">Author Agent</text>
<text x="360" y="566" text-anchor="middle" dominant-baseline="central" fill="rgb(133,183,235)" font-family="sans-serif" font-size="11">revision notes + rebuttal</text>
</g>

<!-- === Loop decision === -->
<line x1="360" y1="580" x2="360" y2="610" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<polygon points="360,610 420,630 360,650 300,630" fill="rgb(38,38,36)" stroke="rgba(222,220,209,0.4)" stroke-width="0.5"/>
<text x="360" y="634" text-anchor="middle" dominant-baseline="central" fill="rgb(194,192,182)" font-family="sans-serif" font-size="10">round &lt; max?</text>

<!-- Loop → back to fan-out (reviewers) -->
<line x1="300" y1="630" x2="50" y2="630" stroke="rgba(222,220,209,0.4)" stroke-width="0.5"/>
<line x1="50" y1="630" x2="50" y2="94" stroke="rgba(222,220,209,0.4)" stroke-width="0.5"/>
<line x1="50" y1="94" x2="354" y2="94" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="30" y="370" text-anchor="start" fill="rgb(194,192,182)" font-family="sans-serif" font-size="11" transform="rotate(-90 30 370)">loop</text>

<!-- End → END -->
<line x1="420" y1="630" x2="600" y2="630" stroke="rgba(222,220,209,0.4)" stroke-width="0.5"/>
<line x1="600" y1="630" x2="600" y2="542" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="515" y="644" text-anchor="middle" fill="rgb(194,192,182)" font-family="sans-serif" font-size="11">max rounds</text>

<!-- Footer note -->
<text x="360" y="688" text-anchor="middle" fill="rgb(194,192,182)" font-family="sans-serif" font-size="11">loop fino ad accept/minor_revision o max_rounds</text>

</svg>